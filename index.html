<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>조여라 와리오옹</title>

<style>

body{
    margin:0;
    background:#202020;
    background-image:url("bg.png");
    background-size:cover;         
    background-position:center;    
    background-repeat:no-repeat;   
    background-attachment:fixed; 

    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
}

.container{
    width:900px;
    max-width:95%;
    margin:auto;
    padding:40px 0;
}

.logo{
    width:320px;
    margin-bottom:30px;
}

.gallery{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:20px;
}

.arrow{
    width:60px;
    height:60px;
    border:none;
    border-radius:50%;
    font-size:35px;
    cursor:pointer;
    background:#444;
    color:white;
}

.arrow:hover{
    background:#666;
}

.imageBox{
    width:700px;
}

.imageBox img{
    width:100%;
    border-radius:15px;
    border:4px solid #444;
}

#desc{
    margin-top:20px;
    font-size:22px;
    min-height:40px;
}

.download{
    display:inline-block;
    margin-top:50px;
    padding:18px 55px;
    font-size:28px;
    background:#ff8a00;
    color:white;
    text-decoration:none;
    border-radius:12px;
    font-weight:bold;
}

.download:hover{
    background:#ff7000;
}

</style>
</head>

<body>

<div class="container">

<img class="logo" src="logo.png">


<h2 class="previewTitle">게임 미리보기</h2>

<div class="gallery">

<button class="arrow" onclick="prev()">&#10094;</button>

<div class="imageBox">
    <img id="image" src="1.png">
    <div id="desc">뽈롱~ 대포를 쏴라!</div>
</div>

<button class="arrow" onclick="next()">&#10095;</button>
</div>


<a class="download"
href="https://github.com/hexagoner6/wario_project/releases/latest">
다운로드
</a>

</div>

<script>

const images=[
"1.png",
"2.png",
"3.png",
"4.png",
"5.png",
"6.png"
];

const descs=[
"뽈롱~ 대포를 쏴라!",
"보고싶은 로켓을 발사!",
"구형벤치치를 피해라!",
"아 조이기해!!!!!!!!!",
"풍선 뒤에 뭐가 있을까?",
"구쭈를 조립해보자!"
];

let index=0;

function update(){

    document.getElementById("image").src=images[index];
    document.getElementById("desc").innerText=descs[index];

}

function next(){

    index++;
    if(index>=images.length)
        index=0;

    update();

}

function prev(){

    index--;
    if(index<0)
        index=images.length-1;

    update();

}

</script>

</body>
</html>
